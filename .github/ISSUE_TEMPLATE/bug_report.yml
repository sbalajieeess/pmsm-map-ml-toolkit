name: Bug report
description: Report a reproducible problem in PMSM Map and ML Toolkit
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Exact reproduction commands
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs and evidence
